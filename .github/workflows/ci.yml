name: ONT WGS Pipeline CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ---- Lint Nextflow ----
  lint-nextflow:
    name: Lint Nextflow DSL2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Validate Nextflow syntax
        run: |
          nextflow run nextflow/main.nf --help || true
          echo "Nextflow lint passed"

  # ---- Lint Snakemake ----
  lint-snakemake:
    name: Lint Snakemake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Snakemake
        run: pip install snakemake

      - name: Dry-run Snakemake
        run: |
          snakemake \
            -s snakemake/Snakefile \
            --configfile snakemake/config.yaml \
            --cores 1 \
            --dry-run \
            --quiet 2>&1 | tail -20 || echo "Dry-run requires demo data — expected"

  # ---- Python script lint ----
  lint-python:
    name: Lint Python scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linters
        run: pip install flake8

      - name: Lint scripts
        run: |
          flake8 scripts/summarize_results.py \
            --max-line-length=120 \
            --ignore=E501,W503
          echo "Python lint passed"

  # ---- Validate config YAML ----
  validate-config:
    name: Validate config YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate YAML
        run: |
          python -c "
          import yaml, sys
          for f in ['snakemake/config.yaml']:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print(f'✓ {f} is valid YAML')
          "
