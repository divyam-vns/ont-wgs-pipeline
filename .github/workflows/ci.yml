name: ONT WGS Pipeline CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # ---- Lint Nextflow ----
  lint-nextflow:
    name: Lint Nextflow DSL2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version

      - name: Validate nextflow.config
        run: |
          grep -q "manifest"    nextflow/nextflow.config && echo "manifest block found"
          grep -q "profiles"    nextflow/nextflow.config && echo "profiles block found"
          grep -q "docker"      nextflow/nextflow.config && echo "docker profile found"
          grep -q "podman"      nextflow/nextflow.config && echo "podman profile found"
          grep -q "singularity" nextflow/nextflow.config && echo "singularity profile found"
          echo "nextflow.config validation passed"

      - name: Check all .nf files are present and non-empty
        run: |
          for nf in nextflow/main.nf nextflow/modules/qc.nf nextflow/modules/align.nf nextflow/modules/variant_calling.nf nextflow/modules/methylation.nf; do
            if [ -s "$nf" ]; then
              echo "$nf exists and is non-empty"
            else
              echo "$nf is missing or empty" && exit 1
            fi
          done

  # ---- Lint Snakemake ----
  lint-snakemake:
    name: Lint Snakemake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Snakemake
        run: pip install snakemake

      - name: Dry-run Snakemake
        run: |
          snakemake -s snakemake/Snakefile --configfile snakemake/config.yaml --cores 1 --dry-run --quiet 2>&1 | tail -20 || echo "Dry-run requires demo data - expected"

  # ---- Python script lint ----
  lint-python:
    name: Lint Python scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Lint scripts
        run: |
          flake8 scripts/summarize_results.py --max-line-length=120 --extend-ignore=E501,W503
          echo "Python lint passed"

  # ---- Validate config YAML ----
  validate-config:
    name: Validate config YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate YAML
        run: |
          python -c "
          import yaml
          for f in ['snakemake/config.yaml']:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print(f + ' is valid YAML')
          "
